apiVersion: apps/v1
kind: Deployment
metadata:
  name: warp-proxy
  namespace: gpt
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: warp-proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: warp-proxy
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: warp-proxy
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: warp-proxy
              topologyKey: kubernetes.io/hostname
      securityContext:
        sysctls:
        - name: net.ipv6.conf.all.disable_ipv6
          value: "0"
        - name: net.ipv4.conf.all.src_valid_mark
          value: "1"
      containers:
      - name: warp
        image: caomingjun/warp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 1080
          protocol: TCP
        securityContext:
          capabilities:
            add:
            - NET_ADMIN

